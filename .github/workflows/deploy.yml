name: Build and Deploy Portfolio

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  DOCKER_IMAGE_NAME: visionaininja
  DOCKER_IMAGE_TAG: v1

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image (No Cache)
        run: |
          docker build --no-cache -t docker.io/${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }} .

      - name: Push Docker Image
        run: |
          docker push docker.io/${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}

      - name: Deploy Local Docker Compose
        run: |
          # Create app dir if not exists
          mkdir -p ~/app

          # Copy current compose configs to deployment directory
          cp docker-compose.yml Caddyfile ~/app/

          # Navigate and write environment configuration
          cd ~/app
          echo "DOCKER_IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}" > .env

          # Deploy
          docker compose up -d --remove-orphans
          docker image prune -f
