name: Build and Deploy Portfolio

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert repo owner to lowercase
        run: |
          echo "REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.REPO_OWNER }}/professional-portfolio:latest
            ghcr.io/${{ env.REPO_OWNER }}/professional-portfolio:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VM via SSH
        run: |
          # Setup SSH directory and private key
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_IP }} >> ~/.ssh/known_hosts

          # Create application directory on VM
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} "mkdir -p ~/app"

          # Copy configuration files to the VM
          scp docker-compose.yml Caddyfile ${{ secrets.VM_USER }}@${{ secrets.VM_IP }}:~/app/

          # Log in to GHCR on the VM, pull the latest image, and restart containers
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} "
            cd ~/app
            echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          "
