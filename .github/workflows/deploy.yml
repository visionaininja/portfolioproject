name: Build and Deploy Portfolio

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  DOCKER_IMAGE_NAME: visionaininja
  DOCKER_IMAGE_TAG: v1

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VM via SSH
        run: |
          # Setup SSH directory and private key
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_IP }} >> ~/.ssh/known_hosts

          # Create application directory on VM
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} "mkdir -p ~/app"

          # Copy configuration files to the VM
          scp docker-compose.yml Caddyfile ${{ secrets.VM_USER }}@${{ secrets.VM_IP }}:~/app/

          # Create environment file, log in to Docker, pull image, and restart containers
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} "
            cd ~/app
            echo 'DOCKER_IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}' > .env
            echo '${{ secrets.DOCKER_PASSWD }}' | docker login -u '${{ secrets.DOCKER_USERNAME }}' --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          "
