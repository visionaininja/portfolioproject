name: Build and Deploy Portfolio

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

env:
  DOCKER_IMAGE_NAME: visionaininja
  DOCKER_IMAGE_TAG: v1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            docker.io/${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Deploy Local Docker Compose
        run: |
          # Create app dir if not exists
          mkdir -p ~/app

          # Copy current compose configs to deployment directory
          cp docker-compose.yml Caddyfile ~/app/

          # Navigate and write environment configuration
          cd ~/app
          echo "DOCKER_IMAGE=docker.io/${{ secrets.DOCKER_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.DOCKER_IMAGE_TAG }}" > .env

          # Pull and update Docker containers
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
